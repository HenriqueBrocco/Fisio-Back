name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fisio
          POSTGRES_USER: fisio
          POSTGRES_PASSWORD: fisio
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fisio -d fisio"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+psycopg://fisio:fisio@127.0.0.1:5432/fisio
      SECRET_KEY: ci-secret
      TEST_PRO_EMAIL: admin@admin.com
      TEST_PRO_PASSWORD: 123

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black . --check

      - name: Run migrations
        run: alembic upgrade head

      - name: Create PRO user for tests
        run: |
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, select
          from sqlalchemy.orm import sessionmaker
          from app.core.security import hash_password
          from app.models.user import User
          import sys
          from pathlib import Path
          ROOT = Path(__file__).resolve().parents[1]
          sys.path.insert(0, str(ROOT / "src"))
          engine = create_engine(os.environ["DATABASE_URL"])
          SessionLocal = sessionmaker(bind=engine)
          db = SessionLocal()
          email = os.environ["TEST_PRO_EMAIL"]
          user = db.execute(select(User).where(User.email == email)).scalar_one_or_none()
          if not user:
            user = User(role="PRO", name="CI Admin", email=email, password_hash=hash_password(os.environ["TEST_PRO_PASSWORD"]))
            db.add(user)
            db.commit()
          db.close()
          PY

      - name: Pytest
        run: pytest -q